<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MenuSlide TV</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',system-ui,sans-serif}
:root{--accent:#d4a84b}

#slide-a,#slide-b{
  position:absolute;inset:0;background-size:cover;background-position:center;
  transition:opacity 1.2s ease;will-change:opacity
}
#slide-a{opacity:1;z-index:1}
#slide-b{opacity:0;z-index:2}
#slide-b.visible{opacity:1}
#slide-a.out{opacity:0}

.overlay{
  position:absolute;inset:0;z-index:3;
  background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.08) 52%,rgba(0,0,0,.38) 100%)
}

#ui{position:absolute;inset:0;z-index:4;display:flex;flex-direction:column;justify-content:space-between;padding:44px 64px}

#top{display:flex;align-items:center;justify-content:space-between}
#rest-name{font-size:15px;letter-spacing:3.5px;text-transform:uppercase;color:rgba(255,255,255,.42);font-weight:400}
#top-right{display:flex;align-items:center;gap:14px}
#clock{font-size:15px;color:rgba(255,255,255,.36);font-variant-numeric:tabular-nums}
#badge{font-size:12px;color:rgba(255,255,255,.28);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:3px 11px}

#bottom{display:flex;align-items:flex-end;justify-content:space-between;gap:40px}
#info{flex:1;min-width:0}
#nombre{
  font-size:clamp(34px,5.2vw,68px);font-weight:700;line-height:1.05;color:#fff;
  text-shadow:0 2px 24px rgba(0,0,0,.55);margin-bottom:10px
}
#desc{
  font-size:clamp(15px,1.9vw,23px);color:rgba(255,255,255,.7);
  line-height:1.45;text-shadow:0 1px 10px rgba(0,0,0,.5);max-width:680px
}
#precio{
  font-size:clamp(30px,4.2vw,58px);font-weight:700;color:var(--accent);
  text-shadow:0 2px 18px rgba(0,0,0,.5);white-space:nowrap;flex-shrink:0
}

#dots{position:absolute;bottom:16px;left:0;right:0;z-index:4;display:flex;justify-content:center;gap:8px}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.22);transition:all .4s}
.dot.on{background:var(--accent);width:22px;border-radius:3px}

#bar{position:absolute;bottom:0;left:0;height:3px;z-index:5;background:var(--accent);width:0%}

#paused{
  position:absolute;inset:0;z-index:6;background:rgba(0,0,0,.32);
  display:none;align-items:center;justify-content:center
}
#paused svg{opacity:.65}

/* Realtime badge */
#live-dot{
  position:absolute;top:22px;right:22px;z-index:5;
  width:8px;height:8px;border-radius:50%;background:#1D9E75;
  box-shadow:0 0 0 0 rgba(29,158,117,.5);animation:pulse 2.5s infinite
}
#live-dot.off{background:#e24b4a;animation:none}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(29,158,117,.5)}70%{box-shadow:0 0 0 8px rgba(29,158,117,0)}100%{box-shadow:0 0 0 0 rgba(29,158,117,0)}}

/* Update flash */
#update-flash{
  position:absolute;top:36px;right:36px;z-index:6;
  background:rgba(29,158,117,.9);border-radius:6px;
  padding:6px 14px;font-size:12px;color:#fff;font-weight:500;
  opacity:0;transition:opacity .3s;pointer-events:none
}
#update-flash.show{opacity:1}

/* Loader / error */
#loader{
  position:absolute;inset:0;z-index:20;background:#000;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px
}
.spin{width:38px;height:38px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#loader p{font-size:13px;color:rgba(255,255,255,.3)}

#cfg-overlay{
  position:absolute;inset:0;z-index:30;background:rgba(0,0,0,.92);
  display:none;align-items:center;justify-content:center
}
#cfg-box{
  background:#141414;border:1px solid #2a2a2a;border-radius:12px;
  padding:32px;width:420px;max-width:90vw
}
#cfg-box h2{font-size:16px;font-weight:500;margin-bottom:20px;color:#efefef}
.cfg-field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.cfg-field label{font-size:12px;color:#777}
.cfg-field input{background:#1c1c1c;border:1px solid #2a2a2a;color:#efefef;border-radius:6px;padding:9px 12px;font-size:13px;width:100%}
.cfg-field input:focus{outline:none;border-color:var(--accent)}
.cfg-btn{width:100%;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:500;cursor:pointer;background:var(--accent);color:#1a1000;margin-top:6px}
.cfg-btn:hover{background:#b8893a}
.cfg-note{font-size:11px;color:#555;text-align:center;margin-top:12px;line-height:1.5}

@media(max-width:768px){
  #ui{padding:24px 28px}
  #nombre{font-size:32px}
  #desc{font-size:15px}
  #precio{font-size:28px}
}
</style>
</head>
<body>

<div id="loader"><div class="spin"></div><p id="loader-txt">Conectando con Supabase...</p></div>

<div id="cfg-overlay">
  <div id="cfg-box">
    <h2>Configuración TV</h2>
    <div class="cfg-field">
      <label>Supabase URL</label>
      <input type="text" id="inp-url" placeholder="https://xxxx.supabase.co">
    </div>
    <div class="cfg-field">
      <label>Supabase anon key</label>
      <input type="text" id="inp-key" placeholder="eyJhbGc...">
    </div>
    <button class="cfg-btn" onclick="saveCredentials()">Conectar</button>
    <p class="cfg-note">Estas credenciales son públicas (anon key).<br>Se guardan en este navegador.</p>
  </div>
</div>

<div id="slide-a"></div>
<div id="slide-b"></div>
<div class="overlay"></div>

<div id="ui">
  <div id="top">
    <div id="rest-name"></div>
    <div id="top-right">
      <div id="clock"></div>
      <div id="badge"></div>
    </div>
  </div>
  <div id="bottom">
    <div id="info">
      <div id="nombre"></div>
      <div id="desc"></div>
    </div>
    <div id="precio"></div>
  </div>
</div>

<div id="dots"></div>
<div id="bar"></div>
<div id="live-dot" class="off" title="Realtime"></div>
<div id="update-flash">✓ Menú actualizado</div>
<div id="paused">
  <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
    <rect x="14" y="12" width="13" height="40" rx="4" fill="white"/>
    <rect x="37" y="12" width="13" height="40" rx="4" fill="white"/>
  </svg>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
/* ── CONFIG ── */
var SUPA_URL = localStorage.getItem('tv_supa_url') || '';
var SUPA_KEY = localStorage.getItem('tv_supa_key') || '';
var supabase, channel;
var platos = [], config = {}, idx = 0;
var timer = null, progInt = null, paused = false;
var slot = 'a';

function saveCredentials(){
  SUPA_URL = document.getElementById('inp-url').value.trim();
  SUPA_KEY = document.getElementById('inp-key').value.trim();
  if(!SUPA_URL || !SUPA_KEY){ alert('Rellena los dos campos.'); return; }
  localStorage.setItem('tv_supa_url', SUPA_URL);
  localStorage.setItem('tv_supa_key', SUPA_KEY);
  document.getElementById('cfg-overlay').style.display = 'none';
  init();
}

/* ── INIT ── */
function init(){
  if(!SUPA_URL || !SUPA_KEY){
    document.getElementById('loader').style.display = 'none';
    document.getElementById('cfg-overlay').style.display = 'flex';
    return;
  }
  document.getElementById('loader').style.display = 'flex';
  document.getElementById('loader-txt').textContent = 'Conectando...';

  try{
    supabase = window.supabase.createClient(SUPA_URL, SUPA_KEY);
  }catch(e){
    showLoader('Error al crear cliente Supabase. Comprueba la URL y la key.'); return;
  }

  loadAll();
  subscribeRealtime();
  setInterval(updateClock, 15000);
  updateClock();
}

/* ── CARGA INICIAL ── */
async function loadAll(){
  try{
    var [cfgRes, platosRes] = await Promise.all([
      supabase.from('config').select('*').single(),
      supabase.from('platos').select('*').eq('activo', true).order('orden', {ascending:true})
    ]);
    if(cfgRes.error && cfgRes.error.code !== 'PGRST116') throw cfgRes.error;
    if(platosRes.error) throw platosRes.error;
    config = cfgRes.data || {restaurant:'Mi Restaurante', moneda:'€', tiempo:6};
    platos = platosRes.data || [];
    document.getElementById('loader').style.display = 'none';
    if(!platos.length){ showLoader('No hay platos activos en el menú.'); return; }
    document.getElementById('rest-name').textContent = (config.restaurant||'').toUpperCase();
    buildDots();
    showSlide(0, true);
  }catch(e){
    showLoader('Error de conexión: ' + e.message + '\n\nPulsa C para reconfigurar.');
  }
}

/* ── REALTIME ── */
function subscribeRealtime(){
  if(channel) supabase.removeChannel(channel);
  channel = supabase
    .channel('menu-changes')
    .on('postgres_changes', {event:'*', schema:'public', table:'platos'}, handleChange)
    .on('postgres_changes', {event:'*', schema:'public', table:'config'}, handleConfigChange)
    .subscribe(function(status){
      var dot = document.getElementById('live-dot');
      if(status === 'SUBSCRIBED'){ dot.classList.remove('off'); }
      else { dot.classList.add('off'); }
    });
}

async function handleChange(){
  var res = await supabase.from('platos').select('*').eq('activo',true).order('orden',{ascending:true});
  if(res.error) return;
  platos = res.data || [];
  if(idx >= platos.length) idx = 0;
  buildDots();
  if(platos.length) showSlide(idx, true);
  flashUpdate();
}

async function handleConfigChange(){
  var res = await supabase.from('config').select('*').single();
  if(res.error) return;
  config = res.data;
  document.getElementById('rest-name').textContent = (config.restaurant||'').toUpperCase();
  flashUpdate();
}

function flashUpdate(){
  var el = document.getElementById('update-flash');
  el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 2500);
}

/* ── SLIDESHOW ── */
function buildDots(){
  document.getElementById('dots').innerHTML = platos.map(function(_,i){
    return '<div class="dot'+(i===idx?' on':'')+'"></div>';
  }).join('');
}
function updateDots(){
  document.querySelectorAll('.dot').forEach(function(d,i){ d.classList.toggle('on',i===idx); });
}

function showSlide(i, instant){
  var p = platos[i];
  var next = slot === 'a' ? 'b' : 'a';
  var nEl = document.getElementById('slide-'+next);
  var cEl = document.getElementById('slide-'+slot);

  nEl.style.backgroundImage = 'url('+p.url+')';
  nEl.style.zIndex = 2; cEl.style.zIndex = 1;

  var t = parseInt(config.tiempo)||6;

  document.getElementById('nombre').textContent = p.nombre;
  document.getElementById('desc').textContent = p.desc || '';
  document.getElementById('precio').textContent = p.precio ? (config.moneda||'€')+p.precio : '';
  document.getElementById('badge').textContent = (i+1)+' / '+platos.length;
  updateDots();

  if(instant){
    nEl.style.transition = 'none';
    nEl.classList.add('visible'); nEl.classList.remove('out');
    cEl.classList.add('out'); cEl.classList.remove('visible');
    slot = next;
    startProgress(t); scheduleNext(t); return;
  }

  nEl.style.transition = 'opacity 1.2s ease';
  setTimeout(function(){
    nEl.classList.add('visible'); nEl.classList.remove('out');
    cEl.classList.remove('visible'); cEl.classList.add('out');
    setTimeout(function(){ cEl.classList.remove('out'); cEl.style.backgroundImage=''; },1300);
    slot = next;
  }, 40);

  startProgress(t); scheduleNext(t);
}

function scheduleNext(t){
  clearTimeout(timer);
  if(paused) return;
  timer = setTimeout(function(){
    idx = (idx+1) % platos.length;
    showSlide(idx);
  }, (t||(parseInt(config.tiempo)||6)) * 1000);
}

function startProgress(t){
  clearInterval(progInt);
  var bar = document.getElementById('bar');
  bar.style.transition = 'none'; bar.style.width = '0%';
  var elapsed = 0, total = (t||(parseInt(config.tiempo)||6))*1000;
  progInt = setInterval(function(){
    if(paused) return;
    elapsed += 50;
    bar.style.width = Math.min(100,(elapsed/total)*100)+'%';
    if(elapsed >= total) clearInterval(progInt);
  }, 50);
}

/* ── PAUSA ── */
document.body.addEventListener('click', function(){
  paused = !paused;
  document.getElementById('paused').style.display = paused ? 'flex' : 'none';
  if(!paused){ scheduleNext(); startProgress(); }
  else{ clearTimeout(timer); clearInterval(progInt); }
});

/* ── TECLADO ── */
document.addEventListener('keydown', function(e){
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){ clearTimeout(timer); idx=(idx+1)%platos.length; showSlide(idx); }
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){ clearTimeout(timer); idx=(idx-1+platos.length)%platos.length; showSlide(idx); }
  if(e.key===' '){ e.preventDefault(); document.body.click(); }
  if(e.key==='f'||e.key==='F'){
    if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(function(){});
    else document.exitFullscreen();
  }
  if(e.key==='c'||e.key==='C'){
    localStorage.removeItem('tv_supa_url'); localStorage.removeItem('tv_supa_key');
    location.reload();
  }
});

/* ── HELPERS ── */
function showLoader(msg){
  document.getElementById('loader').style.display = 'flex';
  document.getElementById('loader-txt').textContent = msg;
}
function updateClock(){
  var n = new Date();
  document.getElementById('clock').textContent =
    n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
}

/* ── START ── */
init();
</script>
</body>
</html>
