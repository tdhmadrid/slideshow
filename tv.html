<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MenuSlide TV</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',system-ui,sans-serif}
:root{--accent:#d4a84b}

/* ── SLOTS DE MEDIA ── */
.slot{
  position:absolute;inset:0;z-index:1;
  transition:opacity 1.2s ease;will-change:opacity;
  background-size:cover;background-position:center;background-repeat:no-repeat
}
.slot.back{z-index:1;opacity:1}
.slot.front{z-index:2;opacity:0}
.slot.front.visible{opacity:1}
.slot.back.out{opacity:0}

/* Video dentro de slot */
.slot video{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;display:block
}

/* GIF: se carga como background-image igual que foto — no necesita nada extra */

.overlay{
  position:absolute;inset:0;z-index:3;
  background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.08) 52%,rgba(0,0,0,.38) 100%)
}

/* ── UI ENCIMA ── */
#ui{position:absolute;inset:0;z-index:4;display:flex;flex-direction:column;justify-content:space-between;padding:44px 64px}
#top{display:flex;align-items:center;justify-content:space-between}
#rest-name{font-size:15px;letter-spacing:3.5px;text-transform:uppercase;color:rgba(255,255,255,.42);font-weight:400}
#top-right{display:flex;align-items:center;gap:14px}
#clock{font-size:15px;color:rgba(255,255,255,.36);font-variant-numeric:tabular-nums}
#badge{font-size:12px;color:rgba(255,255,255,.28);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:3px 11px}

#bottom{display:flex;align-items:flex-end;justify-content:space-between;gap:40px}
#info{flex:1;min-width:0}
#nombre{font-size:clamp(34px,5.2vw,68px);font-weight:700;line-height:1.05;color:#fff;text-shadow:0 2px 24px rgba(0,0,0,.55);margin-bottom:10px}
#desc{font-size:clamp(15px,1.9vw,23px);color:rgba(255,255,255,.7);line-height:1.45;text-shadow:0 1px 10px rgba(0,0,0,.5);max-width:680px}
#precio{font-size:clamp(30px,4.2vw,58px);font-weight:700;color:var(--accent);text-shadow:0 2px 18px rgba(0,0,0,.5);white-space:nowrap;flex-shrink:0}

/* Tipo de media badge (esquina superior izquierda) */
#media-type{
  position:absolute;top:22px;left:22px;z-index:5;
  font-size:11px;color:rgba(255,255,255,.35);
  border:1px solid rgba(255,255,255,.12);border-radius:4px;padding:2px 8px;
  display:none
}
#media-type.show{display:block}

#dots{position:absolute;bottom:16px;left:0;right:0;z-index:4;display:flex;justify-content:center;gap:8px}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.22);transition:all .4s}
.dot.on{background:var(--accent);width:22px;border-radius:3px}

/* Dot especial para video */
.dot.video-dot{border-radius:3px;width:14px}
.dot.video-dot.on{width:22px}

#bar{position:absolute;bottom:0;left:0;height:3px;z-index:5;background:var(--accent);width:0%}

#paused{position:absolute;inset:0;z-index:6;background:rgba(0,0,0,.32);display:none;align-items:center;justify-content:center}
#paused svg{opacity:.65}

#live-dot{
  position:absolute;top:22px;right:22px;z-index:5;
  width:8px;height:8px;border-radius:50%;background:#1D9E75;
  box-shadow:0 0 0 0 rgba(29,158,117,.5);animation:pulse 2.5s infinite
}
#live-dot.off{background:#e24b4a;animation:none}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(29,158,117,.5)}70%{box-shadow:0 0 0 8px rgba(29,158,117,0)}100%{box-shadow:0 0 0 0 rgba(29,158,117,0)}}

#update-flash{
  position:absolute;top:36px;right:36px;z-index:6;
  background:rgba(29,158,117,.9);border-radius:6px;
  padding:6px 14px;font-size:12px;color:#fff;font-weight:500;
  opacity:0;transition:opacity .3s;pointer-events:none
}
#update-flash.show{opacity:1}

/* Loader / error */
#loader{position:absolute;inset:0;z-index:20;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.spin{width:38px;height:38px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#loader p{font-size:13px;color:rgba(255,255,255,.3)}

/* Config overlay */
#cfg-overlay{position:absolute;inset:0;z-index:30;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center}
#cfg-box{background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:32px;width:420px;max-width:90vw}
#cfg-box h2{font-size:16px;font-weight:500;margin-bottom:20px;color:#efefef}
.cfg-field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.cfg-field label{font-size:12px;color:#777}
.cfg-field input{background:#1c1c1c;border:1px solid #2a2a2a;color:#efefef;border-radius:6px;padding:9px 12px;font-size:13px;width:100%}
.cfg-field input:focus{outline:none;border-color:var(--accent)}
.cfg-btn{width:100%;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:500;cursor:pointer;background:var(--accent);color:#1a1000;margin-top:6px}
.cfg-btn:hover{background:#b8893a}
.cfg-note{font-size:11px;color:#555;text-align:center;margin-top:12px;line-height:1.5}

@media(max-width:768px){
  #ui{padding:24px 28px}
  #nombre{font-size:32px}
  #desc{font-size:15px}
  #precio{font-size:28px}
}
</style>
</head>
<body>

<div id="loader"><div class="spin"></div><p id="loader-txt">Conectando con Supabase...</p></div>

<div id="cfg-overlay">
  <div id="cfg-box">
    <h2>Configuración TV</h2>
    <div class="cfg-field">
      <label>Supabase URL</label>
      <input type="text" id="inp-url" placeholder="https://xxxx.supabase.co">
    </div>
    <div class="cfg-field">
      <label>Supabase anon key</label>
      <input type="text" id="inp-key" placeholder="eyJhbGc...">
    </div>
    <button class="cfg-btn" onclick="saveCredentials()">Conectar</button>
    <p class="cfg-note">Credenciales públicas (anon key).<br>Se guardan en este navegador.</p>
  </div>
</div>

<!-- Dos slots para crossfade -->
<div class="slot back" id="slot-a"></div>
<div class="slot front" id="slot-b"></div>
<div class="overlay"></div>

<div id="media-type"></div>

<div id="ui">
  <div id="top">
    <div id="rest-name"></div>
    <div id="top-right">
      <div id="clock"></div>
      <div id="badge"></div>
    </div>
  </div>
  <div id="bottom">
    <div id="info">
      <div id="nombre"></div>
      <div id="desc"></div>
    </div>
    <div id="precio"></div>
  </div>
</div>

<div id="dots"></div>
<div id="bar"></div>
<div id="live-dot" class="off"></div>
<div id="update-flash">✓ Menú actualizado</div>
<div id="paused">
  <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
    <rect x="14" y="12" width="13" height="40" rx="4" fill="white"/>
    <rect x="37" y="12" width="13" height="40" rx="4" fill="white"/>
  </svg>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
/* ════════════════════════════
   UTILIDADES DE TIPO DE MEDIA
════════════════════════════ */
function detectTipo(url) {
  if (!url) return 'imagen';
  var u = url.toLowerCase().split('?')[0];
  if (u.endsWith('.mp4') || u.endsWith('.webm') || u.endsWith('.ogg') || u.endsWith('.mov'))
    return 'video';
  if (u.endsWith('.gif'))
    return 'gif';
  // Para URLs de Supabase Storage con tipo guardado en el nombre
  if (u.includes('.mp4') || u.includes('.webm')) return 'video';
  if (u.includes('.gif')) return 'gif';
  return 'imagen';
}

function tiempoParaTipo(tipo, configTiempo) {
  var t = parseInt(configTiempo) || 6;
  // Los videos duran lo que duran — se respeta su duración natural si es < 60s
  // Para fotos y GIFs usamos el tiempo configurado
  return t;
}

/* ════════════════════════════
   MONTAJE DE MEDIA EN SLOT
════════════════════════════ */
function montarMedia(slotEl, plato, cb) {
  var tipo = plato._tipo || detectTipo(plato.url);
  plato._tipo = tipo;

  // Limpiar slot anterior
  slotEl.innerHTML = '';
  slotEl.style.backgroundImage = 'none';

  if (tipo === 'video') {
    var vid = document.createElement('video');
    vid.src = plato.url;
    vid.autoplay = true;
    vid.muted = true;
    vid.loop = false;
    vid.playsInline = true;
    vid.preload = 'auto';
    vid.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover';
    vid.oncanplay = function() { if (cb) cb('video'); };
    vid.onerror   = function() { if (cb) cb('video-error'); };
    // Cuando termina el video, avanzar al siguiente slide
    vid.onended = function() { nextSlide(); };
    slotEl.appendChild(vid);
  } else {
    // Imagen o GIF — mismo tratamiento (backgroundImage)
    var img = new Image();
    img.onload  = function() {
      slotEl.style.backgroundImage = 'url(' + plato.url + ')';
      if (cb) cb(tipo);
    };
    img.onerror = function() {
      slotEl.style.backgroundImage = 'none';
      if (cb) cb('error');
    };
    img.src = plato.url;
  }
}

/* ════════════════════════════
   ESTADO
════════════════════════════ */
var SUPA_URL = localStorage.getItem('tv_supa_url') || '';
var SUPA_KEY = localStorage.getItem('tv_supa_key') || '';
var supabase, channel;
var platos = [], config = {}, idx = 0;
var timer = null, progInt = null, paused = false;
var slot = 'a'; // slot activo actualmente en pantalla

function saveCredentials() {
  SUPA_URL = document.getElementById('inp-url').value.trim();
  SUPA_KEY = document.getElementById('inp-key').value.trim();
  if (!SUPA_URL || !SUPA_KEY) { alert('Rellena los dos campos.'); return; }
  localStorage.setItem('tv_supa_url', SUPA_URL);
  localStorage.setItem('tv_supa_key', SUPA_KEY);
  document.getElementById('cfg-overlay').style.display = 'none';
  init();
}

/* ════════════════════════════
   INIT
════════════════════════════ */
function init() {
  if (!SUPA_URL || !SUPA_KEY) {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('cfg-overlay').style.display = 'flex';
    return;
  }
  document.getElementById('loader-txt').textContent = 'Conectando...';
  try {
    supabase = window.supabase.createClient(SUPA_URL, SUPA_KEY);
  } catch(e) {
    showLoader('Error: ' + e.message); return;
  }
  loadAll();
  subscribeRealtime();
  setInterval(updateClock, 15000);
  updateClock();
}

/* ════════════════════════════
   CARGA
════════════════════════════ */
async function loadAll() {
  try {
    var [cfgRes, platosRes] = await Promise.all([
      supabase.from('config').select('*').single(),
      supabase.from('platos').select('*').eq('activo', true).order('orden', {ascending:true})
    ]);
    if (cfgRes.error && cfgRes.error.code !== 'PGRST116') throw cfgRes.error;
    if (platosRes.error) throw platosRes.error;
    config = cfgRes.data || {restaurant:'Mi Restaurante', moneda:'€', tiempo:6};
    platos = platosRes.data || [];
    // Pre-detectar tipo de cada plato
    platos.forEach(function(p) { p._tipo = detectTipo(p.url); });
    document.getElementById('loader').style.display = 'none';
    if (!platos.length) { showLoader('No hay platos activos en el menú.'); return; }
    document.getElementById('rest-name').textContent = (config.restaurant||'').toUpperCase();
    buildDots();
    showSlide(0, true);
  } catch(e) {
    showLoader('Error: ' + e.message + ' — Pulsa C para reconfigurar.');
  }
}

/* ════════════════════════════
   REALTIME
════════════════════════════ */
function subscribeRealtime() {
  if (channel) supabase.removeChannel(channel);
  channel = supabase.channel('menu-changes')
    .on('postgres_changes', {event:'*', schema:'public', table:'platos'}, handleChange)
    .on('postgres_changes', {event:'*', schema:'public', table:'config'}, handleConfigChange)
    .subscribe(function(status) {
      var dot = document.getElementById('live-dot');
      if (status === 'SUBSCRIBED') dot.classList.remove('off');
      else dot.classList.add('off');
    });
}

async function handleChange() {
  var res = await supabase.from('platos').select('*').eq('activo',true).order('orden',{ascending:true});
  if (res.error) return;
  platos = res.data || [];
  platos.forEach(function(p) { p._tipo = detectTipo(p.url); });
  if (idx >= platos.length) idx = 0;
  buildDots();
  if (platos.length) showSlide(idx, true);
  flashUpdate();
}

async function handleConfigChange() {
  var res = await supabase.from('config').select('*').single();
  if (res.error) return;
  config = res.data;
  document.getElementById('rest-name').textContent = (config.restaurant||'').toUpperCase();
  flashUpdate();
}

function flashUpdate() {
  var el = document.getElementById('update-flash');
  el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 2500);
}

/* ════════════════════════════
   DOTS
════════════════════════════ */
function buildDots() {
  document.getElementById('dots').innerHTML = platos.map(function(p,i){
    var cls = 'dot' + (p._tipo==='video'?' video-dot':'') + (i===idx?' on':'');
    return '<div class="' + cls + '"></div>';
  }).join('');
}
function updateDots() {
  var dots = document.querySelectorAll('.dot');
  dots.forEach(function(d,i){ d.classList.toggle('on', i===idx); });
}

/* ════════════════════════════
   MOSTRAR SLIDE (crossfade)
════════════════════════════ */
function showSlide(i, instant) {
  var p = platos[i];
  var nextSlotId = slot === 'a' ? 'b' : 'a';
  var nEl = document.getElementById('slot-' + nextSlotId);
  var cEl = document.getElementById('slot-' + slot);

  // Detener vídeo anterior si lo había
  var oldVid = cEl.querySelector('video');
  if (oldVid) { oldVid.pause(); oldVid.onended = null; }

  // Actualizar texto e info
  document.getElementById('nombre').textContent = p.nombre;
  document.getElementById('desc').textContent = p.descripcion || '';
  document.getElementById('precio').textContent = p.precio ? (config.moneda||'€') + p.precio : '';
  document.getElementById('badge').textContent = (i+1) + ' / ' + platos.length;
  updateDots();

  // Badge de tipo
  var mtEl = document.getElementById('media-type');
  if (p._tipo === 'video') {
    mtEl.textContent = '▶ VIDEO'; mtEl.classList.add('show');
  } else if (p._tipo === 'gif') {
    mtEl.textContent = '⟳ GIF'; mtEl.classList.add('show');
  } else {
    mtEl.classList.remove('show');
  }

  // Montar media en el slot oculto
  montarMedia(nEl, p, function(tipo) {
    // Una vez cargado, hacer crossfade
    nEl.style.zIndex = 2; cEl.style.zIndex = 1;

    if (instant) {
      nEl.style.transition = 'none';
    } else {
      nEl.style.transition = 'opacity 1.2s ease';
    }

    nEl.classList.add('visible'); nEl.classList.remove('out');
    cEl.classList.remove('visible'); cEl.classList.add('out');

    setTimeout(function() {
      cEl.classList.remove('out');
      cEl.innerHTML = '';
      cEl.style.backgroundImage = 'none';
    }, instant ? 0 : 1300);

    slot = nextSlotId;

    // Arrancar vídeo (por si autoplay no lo hizo)
    var newVid = nEl.querySelector('video');
    if (newVid) {
      newVid.play().catch(function(){});
      // Para video: no usamos timer fijo, esperamos onended
      // Pero ponemos un máximo de 60s por si el video es muy largo
      clearTimeout(timer); clearInterval(progInt);
      var maxSeg = 60;
      startProgress(maxSeg);
      timer = setTimeout(function(){ nextSlide(); }, maxSeg * 1000);
    } else {
      // Foto o GIF: usar tiempo configurado
      var t = parseInt(config.tiempo) || 6;
      startProgress(t);
      scheduleNext(t);
    }
  });
}

function nextSlide() {
  if (paused) return;
  idx = (idx + 1) % platos.length;
  showSlide(idx);
}

function scheduleNext(t) {
  clearTimeout(timer);
  if (paused) return;
  timer = setTimeout(function(){ nextSlide(); }, t * 1000);
}

function startProgress(t) {
  clearInterval(progInt);
  var bar = document.getElementById('bar');
  bar.style.transition = 'none'; bar.style.width = '0%';
  var elapsed = 0, total = t * 1000;
  progInt = setInterval(function() {
    if (paused) return;
    elapsed += 50;
    bar.style.width = Math.min(100, (elapsed/total)*100) + '%';
    if (elapsed >= total) clearInterval(progInt);
  }, 50);
}

/* ════════════════════════════
   PAUSA / TECLADO
════════════════════════════ */
document.body.addEventListener('click', function() {
  paused = !paused;
  document.getElementById('paused').style.display = paused ? 'flex' : 'none';
  var vid = document.getElementById('slot-'+slot).querySelector('video');
  if (paused) {
    clearTimeout(timer); clearInterval(progInt);
    if (vid) vid.pause();
  } else {
    if (vid) { vid.play().catch(function(){}); startProgress(60); scheduleNext(60); }
    else { var t = parseInt(config.tiempo)||6; scheduleNext(t); startProgress(t); }
  }
});

document.addEventListener('keydown', function(e) {
  if (e.key==='ArrowRight'||e.key==='ArrowDown') { clearTimeout(timer); idx=(idx+1)%platos.length; showSlide(idx); }
  if (e.key==='ArrowLeft'||e.key==='ArrowUp')    { clearTimeout(timer); idx=(idx-1+platos.length)%platos.length; showSlide(idx); }
  if (e.key===' ') { e.preventDefault(); document.body.click(); }
  if (e.key==='f'||e.key==='F') {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(function(){});
    else document.exitFullscreen();
  }
  if (e.key==='c'||e.key==='C') {
    localStorage.removeItem('tv_supa_url'); localStorage.removeItem('tv_supa_key');
    location.reload();
  }
});

/* ════════════════════════════
   HELPERS
════════════════════════════ */
function showLoader(msg) {
  document.getElementById('loader').style.display = 'flex';
  document.getElementById('loader-txt').textContent = msg;
}
function updateClock() {
  var n = new Date();
  document.getElementById('clock').textContent =
    n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
}

init();
</script>
</body>
</html>
